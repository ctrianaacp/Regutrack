version: "3.9"

services:
# ─── PostgreSQL y pgAdmin ────────────────────────────────────
  # NOTA: La base de datos ahora está en producción (Coolify VPS).
  # Usa start-local.ps1 para levantar el túnel SSH al VPS.

  # ─── FastAPI Backend ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: regutrack-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-}@host.docker.internal:5432/${POSTGRES_DB:-regutrack}
      LOG_LEVEL: INFO
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - .:/app          # Mount source for development hot-reload

volumes:
  # Ya no se usan volúmenes de db en local
  api_logs:
